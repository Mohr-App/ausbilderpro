<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>AusbilderPro – VerwaltungPro – AzubiPro</title>
<link rel="manifest" href="manifest-ag.json">
<meta name="theme-color" content="#1e2230">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ArbeitgeberPro">
<link rel="apple-touch-icon" href="icon-ag-192.png">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<style>
:root{--bg:#f0f2f8;--sur:#fff;--sur2:#f5f6fa;--brd:#c4cce0;--tx:#0f172a;--mu:#475569;--acc:#2563eb;--ok:#16a34a;--bad:#dc2626;--warn:#d97706;}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Sora',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;}
#loginWrap{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;}
.login-box{background:#fff;border:2px solid var(--brd);border-radius:18px;padding:40px 36px;width:100%;max-width:360px;box-shadow:0 24px 80px rgba(0,0,0,.12);display:flex;flex-direction:column;align-items:stretch;}
.login-logo{font-size:1.4rem;font-weight:800;text-align:center;margin-bottom:4px;color:var(--tx);}
.login-logo span{color:#1e3a5f}
.login-sub{font-size:.72rem;color:var(--mu);text-align:center;font-family:'JetBrains Mono',monospace;margin-bottom:28px;}
.fi{width:100%;background:#fff;border:2px solid var(--brd);border-radius:9px;padding:11px 14px;color:var(--tx);font-family:'Sora',sans-serif;font-size:.85rem;outline:none;transition:border .15s;}
.fi:focus{border-color:var(--acc);}
.fg{display:flex;flex-direction:column;gap:6px;margin-bottom:12px;}
.fl{font-size:.72rem;color:var(--mu);font-weight:600;}
.btn{width:100%;padding:12px;background:linear-gradient(135deg,#1d4ed8,#3b82f6);border:none;border-radius:9px;color:#fff;font-family:'Sora',sans-serif;font-size:.87rem;font-weight:700;cursor:pointer;transition:all .15s;}
.btn:hover{transform:translateY(-1px);box-shadow:0 6px 22px rgba(59,130,246,.35);}
.err{color:var(--bad);font-size:.72rem;text-align:center;min-height:18px;}
.hdr{display:flex;align-items:center;gap:14px;padding:0 20px;height:54px;background:#64748b;border-bottom:2px solid #94a3b8;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.08);}
.hdr-logo{font-size:1rem;font-weight:800;color:#fff;}.hdr-logo span{color:#1e3a5f;}
.hdr-firma{font-size:.72rem;color:rgba(255,255,255,.7);font-family:'JetBrains Mono',monospace;margin-left:auto;}
.hdr-btn{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);border-radius:7px;color:#fff;font-family:'Sora',sans-serif;font-size:.72rem;padding:6px 12px;cursor:pointer;transition:all .12s;}
.hdr-btn:hover{border-color:#fff;background:rgba(255,255,255,.25);}
.main{padding:20px;max-width:900px;margin:0 auto;}
.page-title{font-size:1.3rem;font-weight:800;margin-bottom:4px;}
.page-sub{font-size:.72rem;color:var(--mu);margin-bottom:18px;}
.card{background:#fff;border:2px solid var(--brd);border-radius:13px;padding:20px;margin-bottom:14px;box-shadow:0 1px 4px rgba(0,0,0,.06);}
.card-title{font-size:.82rem;font-weight:800;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:18px;}
.stat-card{background:#fff;border:2px solid var(--brd);border-radius:13px;padding:16px;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,.06);}
.stat-num{font-size:1.8rem;font-weight:800;color:var(--acc);font-family:'JetBrains Mono',monospace;}
.stat-label{font-size:.65rem;color:var(--mu);font-weight:600;margin-top:2px;}
.azubi-card{display:flex;align-items:center;gap:12px;padding:12px 14px;background:#fff;border:2px solid var(--brd);border-radius:10px;margin-bottom:8px;transition:border .12s;cursor:pointer;box-shadow:0 1px 3px rgba(0,0,0,.04);}
.azubi-card:hover{border-color:var(--acc);}
.azubi-card.expanded{border-color:var(--acc);background:var(--sur2);}
.azubi-av{width:40px;height:40px;border-radius:50%;background:rgba(37,99,235,.1);border:2px solid rgba(37,99,235,.25);display:flex;align-items:center;justify-content:center;font-size:.82rem;font-weight:800;color:var(--acc);flex-shrink:0;overflow:hidden;}
.azubi-av img{width:100%;height:100%;object-fit:cover;}
.azubi-info{flex:1;min-width:0;}
.azubi-name{font-size:.88rem;font-weight:700;}
.azubi-sub{font-size:.68rem;color:var(--mu);}
.azubi-badge{font-size:.6rem;font-weight:700;padding:2px 8px;border-radius:6px;font-family:'JetBrains Mono',monospace;}
.kurs-box{background:var(--sur2);border:1px solid var(--brd);border-radius:10px;padding:14px;margin-top:10px;}
.kurs-name{font-size:.85rem;font-weight:800;margin-bottom:4px;}
.kurs-meta{font-size:.68rem;color:var(--mu);font-family:'JetBrains Mono',monospace;margin-bottom:8px;}
.kurs-field{display:flex;align-items:baseline;gap:8px;padding:4px 0;font-size:.75rem;}
.kurs-field-label{color:var(--mu);font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;min-width:80px;font-family:'JetBrains Mono',monospace;}
.att-bar{display:flex;gap:2px;margin:8px 0;height:18px;border-radius:4px;overflow:hidden;}
.att-seg{min-width:2px;}
.att-summary{font-size:.65rem;font-family:'JetBrains Mono',monospace;color:var(--mu);display:flex;gap:10px;flex-wrap:wrap;}
.att-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:3px;}
.toast{position:fixed;bottom:20px;right:20px;background:#fff;border:2px solid var(--ok);border-radius:10px;padding:12px 18px;font-size:.8rem;font-weight:600;color:var(--ok);z-index:999;transform:translateY(60px);opacity:0;transition:all .25s;box-shadow:0 4px 16px rgba(0,0,0,.1);}
.toast.show{transform:none;opacity:1;}.toast.bad{border-color:var(--bad);color:var(--bad);}
.empty{color:var(--mu);font-size:.78rem;text-align:center;padding:30px 12px;font-family:'JetBrains Mono',monospace;}
.copyright{position:fixed;bottom:8px;right:12px;font-family:'JetBrains Mono',monospace;font-size:.52rem;color:var(--mu);opacity:.45;}
@media(max-width:600px){.stat-row{grid-template-columns:1fr;}.hdr{padding:0 12px;gap:8px;}.hdr-logo{font-size:.88rem;}.main{padding:14px 10px;}}
@keyframes pulseRed{0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,.3)}50%{box-shadow:0 0 0 10px rgba(239,68,68,0)}}
</style>
</head>
<body>
<div id="loginWrap">
  <div class="login-box">
    <div class="login-logo">Arbeitgeber<span>Pro</span></div>
    <div class="login-sub">Ausbildungsportal für Betriebe</div>
    <div class="fg"><label class="fl">E-Mail</label><input class="fi" type="email" id="lEmail" placeholder="name@firma.de"></div>
    <div class="fg"><label class="fl">Passwort</label><input class="fi" type="password" id="lPw" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"></div>
    <div class="err" id="lErr"></div>
    <button class="btn" onclick="doLogin()" style="margin-top:8px">Anmelden</button>
    <button class="btn" onclick="doReset()" style="background:#fff;border:1px solid var(--brd);box-shadow:none;color:var(--mu);font-size:.72rem;padding:8px;margin-top:6px">Passwort vergessen</button>
  </div>
</div>
<div id="appWrap" style="display:none">
  <div class="hdr">
    <div class="hdr-logo">Arbeitgeber<span>Pro</span></div>
    <div class="hdr-firma" id="hdrFirma"></div>
    <button class="hdr-btn" onclick="doLogout()">⎋ Abmelden</button>
  </div>
  <div class="main">
    <div class="page-title" id="welcomeTitle">Willkommen</div>
    <div class="page-sub" id="welcomeSub"></div>
    <div class="stat-row">
      <div class="stat-card"><div class="stat-num" id="statAzubis">–</div><div class="stat-label">Auszubildende</div></div>
      <div class="stat-card"><div class="stat-num" id="statAktiv">–</div><div class="stat-label">In Lehrgängen</div></div>
      <div class="stat-card"><div class="stat-num" id="statAnw">–</div><div class="stat-label">⌀ Anwesenheit</div></div>
    </div>
    <div id="agNotifBanner"></div>
    <div class="card">
      <div class="card-title">👥 Ihre Auszubildenden</div>
      <div id="azubiList"><div class="empty">Lädt…</div></div>
    </div>
  </div>
  <div class="toast" id="toast"></div>
</div>
<div class="copyright">© ArbeitgeberPro v1.0.0 ─ by Stefan Mohr</div>
<script>
const firebaseConfig={apiKey:"AIzaSyCI5hJLj22FTiAJoVIPis7VhoQqJiMLAZQ",authDomain:"ausbilderpro.firebaseapp.com",projectId:"ausbilderpro",storageBucket:"ausbilderpro.firebasestorage.app",messagingSenderId:"937082794250",appId:"1:937082794250:web:eb99bc41d8f39908df8af3"};
firebase.initializeApp(firebaseConfig);
const auth=firebase.auth();
const db=firebase.firestore();
db.enablePersistence({synchronizeTabs:true}).catch(()=>{});

let _uid=null,_email='',_firma='',_azubis=[],_kurse={},_kursListeners={};

function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}
function fmtDE(d){if(!d||d.length<10)return d||'?';const p=d.split('-');return p[2]+'.'+p[1]+'.'+p[0];}
function toast(msg,type){const t=document.getElementById('toast');t.textContent=msg;t.className='toast show'+(type==='bad'?' bad':'');setTimeout(()=>t.className='toast',3000);}

function doLogin(){
  const email=document.getElementById('lEmail').value.trim();
  const pw=document.getElementById('lPw').value;
  if(!email||!pw){document.getElementById('lErr').textContent='Bitte E-Mail und Passwort eingeben';return;}
  document.getElementById('lErr').textContent='';
  auth.signInWithEmailAndPassword(email,pw).catch(err=>{
    const m={'auth/user-not-found':'E-Mail nicht gefunden','auth/wrong-password':'Falsches Passwort','auth/invalid-email':'Ungültige E-Mail','auth/too-many-requests':'Zu viele Versuche'};
    document.getElementById('lErr').textContent=m[err.code]||err.message;
  });
}
function doReset(){
  const email=document.getElementById('lEmail').value.trim();
  if(!email){document.getElementById('lErr').textContent='Bitte E-Mail eingeben';return;}
  auth.sendPasswordResetEmail(email).then(()=>toast('Reset-Link gesendet ✓')).catch(err=>document.getElementById('lErr').textContent=err.message);
}
function doLogout(){auth.signOut();}

auth.onAuthStateChanged(user=>{
  if(user){
    _uid=user.uid;_email=user.email;
    document.getElementById('loginWrap').style.display='none';
    document.getElementById('appWrap').style.display='';
    loadUserData();
  } else {
    _uid=null;
    document.getElementById('loginWrap').style.display='';
    document.getElementById('appWrap').style.display='none';
    Object.values(_kursListeners).forEach(u=>u());
    _kursListeners={};
  }
});

function loadUserData(){
  db.collection('users').doc(_uid).get().then(doc=>{
    if(!doc.exists){toast('Kein Zugang','bad');return;}
    const d=doc.data();
    if(d.role!=='arbeitgeber'){toast('Kein Arbeitgeber-Zugang','bad');auth.signOut();return;}
    _firma=d.firma||'';
    document.getElementById('hdrFirma').textContent=_firma;
    document.getElementById('welcomeTitle').textContent='Willkommen, '+esc(_firma);
    document.getElementById('welcomeSub').textContent='Übersicht Ihrer Auszubildenden und deren Lehrgänge · Echtzeit-Anwesenheit';
    loadAzubis();
    checkAGPremium();
  });
}

function loadAzubis(){
  if(!_firma)return;
  db.collection('globalTN').where('firma','==',_firma).onSnapshot(snap=>{
    _azubis=[];
    snap.forEach(doc=>_azubis.push({id:doc.id,...doc.data()}));
    _azubis.sort((a,b)=>(a.nachname||'').localeCompare(b.nachname||'','de'));
    renderStats();renderAzubiList();setupKursListeners();renderAusfallBanner();
  });
}

function setupKursListeners(){
  // Ausfall-Banner bei TN-Änderungen aktualisieren
  renderAusfallBanner();
  const active=new Set();
  _azubis.forEach(a=>{if(a.aktiverKursId)active.add(a.aktiverKursId);});
  Object.keys(_kursListeners).forEach(k=>{if(!active.has(k)){_kursListeners[k]();delete _kursListeners[k];delete _kurse[k];}});
  active.forEach(kursId=>{
    if(_kursListeners[kursId])return;
    db.collection('shared').doc('kurse').collection('list').doc(kursId).get().then(doc=>{
      if(doc.exists){_kurse[kursId]=_kurse[kursId]||{};Object.assign(_kurse[kursId],doc.data());renderAzubiList();}
    });
    _kursListeners[kursId]=db.collection('shared').doc('kurse').collection('list').doc(kursId)
      .collection('teilnehmer').onSnapshot(snap=>{
        if(!_kurse[kursId])_kurse[kursId]={};
        _kurse[kursId].tnData={};
        snap.forEach(doc=>_kurse[kursId].tnData[doc.id]=doc.data());
        renderStats();renderAzubiList();
      });
  });
}

function renderAusfallBanner(){
  const el=document.getElementById('agNotifBanner');
  if(!el) return;
  const today=new Date().toISOString().slice(0,10);
  const ausfaelle=[];
  _azubis.forEach(a=>{
    const notifs=(a.benachrichtigungen||[]).filter(n=>n.typ==='kurs_ausfall'&&n.datum===today&&!n.gelesen);
    notifs.forEach(n=>{
      if(!ausfaelle.some(x=>x.kursId===n.kursId)){
        ausfaelle.push({...n, tnName:(a.vorname||'')+' '+(a.nachname||'')});
      }
    });
  });
  if(!ausfaelle.length){el.innerHTML='';return;}
  el.innerHTML=ausfaelle.map(n=>{
    const betroffene=_azubis.filter(a=>(a.benachrichtigungen||[]).some(x=>x.typ==='kurs_ausfall'&&x.datum===today&&x.kursId===n.kursId));
    const namen=betroffene.map(a=>(a.vorname||'')+' '+(a.nachname||'')).join(', ');
    return '<div style="padding:14px;background:rgba(239,68,68,.1);border:3px solid #ef4444;border-radius:12px;margin-bottom:12px;animation:pulseRed 1.5s infinite">'
      +'<div style="font-size:1rem;font-weight:800;color:#ef4444;margin-bottom:6px">🚨 LEHRGANG FÄLLT HEUTE AUS</div>'
      +'<div style="font-size:.85rem;font-weight:700;margin-bottom:4px">'+esc(n.kursName||'Lehrgang')+'</div>'
      +'<div style="font-size:.78rem;color:#1e293b;line-height:1.5;margin-bottom:6px">'+esc(n.nachricht||'')+'</div>'
      +'<div style="font-size:.68rem;color:#64748b;margin-top:4px">Betroffen: <b>'+esc(namen)+'</b></div>'
      +'<div style="font-size:.62rem;color:#94a3b8;margin-top:2px">Von: '+esc(n.von||'Ausbilder')+' · '+esc(n.datumDE||'')+'</div>'
      +'</div>';
  }).join('');
}

function renderStats(){
  document.getElementById('statAzubis').textContent=_azubis.length;
  document.getElementById('statAktiv').textContent=_azubis.filter(a=>a.aktiverKursId).length;
  let tp=0,cp=0;
  _azubis.forEach(a=>{
    if(!a.aktiverKursId)return;
    const kd=_kurse[a.aktiverKursId];
    if(!kd||!kd.tnData||!kd.tnData[a.id])return;
    const t=kd.tnData[a.id];
    if(t.attPercent!=null){tp+=t.attPercent;cp++;}
  });
  document.getElementById('statAnw').textContent=cp?Math.round(tp/cp)+'%':'–';
}

function renderAzubiList(){
  const el=document.getElementById('azubiList');
  if(!_azubis.length){el.innerHTML='<div class="empty">Keine Auszubildenden gefunden.<br>Bitte wenden Sie sich an die Hauptverwaltung.</div>';return;}
  // Archiv-System
  const archived=_getArchived();
  const showArchived=window._showArchived||false;
  // Merke offene Karten
  const openIds=new Set();
  document.querySelectorAll('.azubi-card.expanded').forEach(c=>{if(c.dataset.tnId)openIds.add(c.dataset.tnId);});
  el.innerHTML='';
  const today=new Date().toISOString().slice(0,10);
  // Sortieren: aktive zuerst, archivierte hinten
  const sortedAzubis=[..._azubis];
  // Auto-Unarchiv: Wenn TN wieder einen laufenden Kurs hat, automatisch aus Archiv nehmen
  let archChanged=false;
  sortedAzubis.forEach(a=>{
    if(archived.includes(a.id)&&a.aktiverKursId){
      const k=_kurse[a.aktiverKursId];
      if(k&&k.von&&k.von<=today&&(!k.bis||k.bis>=today)){
        const idx=archived.indexOf(a.id);
        if(idx>=0){archived.splice(idx,1);archChanged=true;}
      }
    }
  });
  if(archChanged) _saveArchived(archived);
  const activeList=sortedAzubis.filter(a=>!archived.includes(a.id));
  const archivedList=sortedAzubis.filter(a=>archived.includes(a.id));
  // Sync-Hinweis (immer anzeigen)
  const hint=document.createElement('div');
  hint.id='agSyncHint';
  hint.style.cssText='font-size:.58rem;color:var(--mu);margin-bottom:10px;padding:0 4px';
  el.appendChild(hint);
  renderAGSyncStatus();
  // Archiv-Toggle
  if(archivedList.length){
    const toggle=document.createElement('div');
    toggle.style.cssText='display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:var(--sur2);border:1px solid var(--brd);border-radius:8px;margin-bottom:10px;cursor:pointer;user-select:none';
    toggle.innerHTML='<span style="font-size:.72rem;color:var(--mu);font-weight:600">📦 '+archivedList.length+' archivierte Azubi'+(archivedList.length>1?'s':'')+'</span><span style="font-size:.62rem;color:var(--acc);font-weight:700">'+(showArchived?'▾ Ausblenden':'▸ Anzeigen')+'</span>';
    toggle.onclick=()=>{window._showArchived=!window._showArchived;renderAzubiList();};
    el.appendChild(toggle);
  }
  const displayList=showArchived?[...activeList,...archivedList]:activeList;
  displayList.forEach(a=>{
    const isArchived=archived.includes(a.id);
    const name=((a.vorname||'')+' '+(a.nachname||'')).trim();
    const init=((a.vorname||'?')[0]+(a.nachname||'?')[0]).toUpperCase();
    const kurs=a.aktiverKursId?_kurse[a.aktiverKursId]:null;
    const kursLaeuft=kurs&&kurs.von&&kurs.bis&&today>=kurs.von&&today<=kurs.bis;
    const kursGeplant=kurs&&kurs.von&&today<kurs.von;
    const td=kurs&&kurs.tnData?kurs.tnData[a.id]:null;
    // Letzten abgebrochenen Kurs aus History finden (nur wenn Kurs noch laufen würde)
    const lastAbgebr=!a.aktiverKursId?(a.kursHistory||[]).filter(h=>h.abgebrochen&&h.bis&&h.bis>=today).sort((a,b)=>(b.addedAt||0)-(a.addedAt||0))[0]:null;
    let badge='';
    if(lastAbgebr)badge='<span class="azubi-badge" style="background:rgba(220,38,38,.08);color:#dc2626">✗ Lehrgang abgebrochen</span>';
    else if(a.status==='absent')badge='<span class="azubi-badge" style="background:rgba(220,38,38,.08);color:#dc2626">✗ Nicht erschienen</span>';
    else if(a.wiederholer)badge='<span class="azubi-badge" style="background:rgba(217,119,6,.08);color:#d97706">↻ Wiederholer</span>';
    else if(kursLaeuft)badge='<span class="azubi-badge" style="background:rgba(22,163,74,.08);color:#16a34a">● Laufend</span>';
    else if(kursGeplant)badge='<span class="azubi-badge" style="background:rgba(37,99,235,.08);color:#2563eb">◐ Geplant</span>';
    else if(a.aktiverKursId)badge='<span class="azubi-badge" style="background:rgba(148,163,184,.1);color:#94a3b8">○ Beendet</span>';
    else badge='<span class="azubi-badge" style="background:rgba(148,163,184,.1);color:#94a3b8">Kein Lehrgang</span>';
    // Berufsschultag heute?
    const bsToday=kurs&&(kurs.berufsschultage||[]).includes(today);
    if(bsToday)badge+='<span class="azubi-badge" style="background:rgba(139,92,246,.08);color:#7c3aed">🎓 Berufsschultag</span>';
    let attBadge='';
    if(td&&td.attTotal){const p=td.attPercent||0;const c=p>=80?'#16a34a':p>=60?'#d97706':'#dc2626';attBadge='<span class="azubi-badge" style="background:rgba('+(p>=80?'22,163,74':p>=60?'217,119,6':'220,38,38')+',.08);color:'+c+'">'+p+'%</span>';}
    let wzBadge='';
    if(td&&td.werkzeugStatus==='fehlt') wzBadge='<span class="azubi-badge" style="background:rgba(239,68,68,.08);color:#dc2626">🔧 Werkzeug fehlt</span>';
    let urlBadge='';
    const aktUrlaub=(a.urlaub||[]).find(u=>u.von<=today&&u.bis>=today);
    if(aktUrlaub) urlBadge='<span class="azubi-badge" style="background:rgba(245,158,11,.08);color:#d97706">🏖 Urlaub</span>';
    const card=document.createElement('div');
    card.className='azubi-card';card.dataset.tnId=a.id;
    if(isArchived) card.style.cssText+='opacity:.45;border-style:dashed;';

function agArchive(tnId){
  const archived=_getArchived();
  if(!archived.includes(tnId)) archived.push(tnId);
  _saveArchived(archived);
  renderAzubiList();
}
function agUnarchive(tnId){
  let archived=_getArchived();
  archived=archived.filter(id=>id!==tnId);
  _saveArchived(archived);
  renderAzubiList();
}
function _getArchived(){
  if(_agPremium&&_agArchivedCloud!==null) return [..._agArchivedCloud];
  return JSON.parse(localStorage.getItem('ag_archiv_'+(_firma||''))||'[]');
}
function _saveArchived(arr){
  // Immer lokal speichern
  localStorage.setItem('ag_archiv_'+(_firma||''),JSON.stringify(arr));
  // Cloud-Sync wenn Premium
  if(_agPremium){
    _agArchivedCloud=arr;
    db.collection('users').doc(_uid).update({archivedTN:arr}).catch(()=>{});
  }
}
let _agPremium=false;
let _agArchivedCloud=null;
function checkAGPremium(){
  db.collection('users').doc(_uid).get().then(doc=>{
    if(!doc.exists) return;
    const d=doc.data();
    _agPremium=!!d.agPremium;
    if(_agPremium&&d.archivedTN){
      _agArchivedCloud=d.archivedTN;
      renderAzubiList();
    }
  }).catch(()=>{});
}
function toggleAGPremium(){
  if(_agPremium){
    // Downgrade
    if(!confirm('Cloud-Sync deaktivieren? Archiv wird nur noch lokal gespeichert.')) return;
    db.collection('users').doc(_uid).update({agPremium:false}).then(()=>{
      _agPremium=false;_agArchivedCloud=null;
      renderAzubiList();renderAGSyncStatus();
    });
  } else {
    // Upgrade
    db.collection('users').doc(_uid).update({agPremium:true,archivedTN:_getArchived()}).then(()=>{
      _agPremium=true;_agArchivedCloud=_getArchived();
      renderAzubiList();renderAGSyncStatus();
      toast('☁ Cloud-Sync aktiviert ✓');
    });
  }
}

// ── Dokumente-Austausch ──
function loadDokumente(tnId){
  const el=document.getElementById('dokList_'+tnId);
  if(!el) return;
  db.collection('globalTN').doc(tnId).collection('dokumente')
    .orderBy('ts','desc').onSnapshot(snap=>{
      if(snap.empty){el.innerHTML='<div style="color:var(--mu);font-size:.65rem;font-style:italic">Noch keine Dokumente</div>';return;}
      let h='';
      snap.forEach(doc=>{
        const d=doc.data();
        const fName=d.fileName||d.name||'Dokument';
        const icon=fName.match(/\.pdf$/i)?'📕':fName.match(/\.(jpg|jpeg|png)$/i)?'🖼':'📄';
        const vonLabel=d.vonRolle==='azubi'?'<span style="color:#7c3aed;font-weight:700">Azubi</span>':'<span style="color:var(--acc);font-weight:700">Betrieb</span>';
        h+='<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--brd)">'
          +'<span style="font-size:1rem">'+icon+'</span>'
          +'<div style="flex:1;min-width:0"><div style="font-size:.72rem;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(fName)+'</div>'
          +'<div style="font-size:.55rem;color:var(--mu)">'+vonLabel+' · '+new Date(d.ts).toLocaleDateString('de-DE')+'</div></div>'
          +'<button onclick="event.stopPropagation();downloadDok(\''+tnId+'\',\''+doc.id+'\')" style="font-size:.55rem;padding:3px 8px;border:1px solid var(--brd);border-radius:5px;background:var(--sur2);cursor:pointer;color:var(--tx)">💾</button>'
          +'<button onclick="event.stopPropagation();deleteDok(\''+tnId+'\',\''+doc.id+'\',\''+esc(fName)+'\')" style="font-size:.55rem;padding:3px 8px;border:1px solid rgba(239,68,68,.2);border-radius:5px;background:none;cursor:pointer;color:#ef4444">✕</button>'
          +'</div>';
      });
      el.innerHTML=h;
    },()=>{el.innerHTML='<div style="color:var(--mu);font-size:.65rem">Fehler beim Laden</div>';});
}

function agUploadDok(tnId,input){
  if(!_agPremium){
    toast('📄 Dokumente erfordert Cloud-Sync (1,99€/M)','bad');
    input.value='';return;
  }
  const file=input.files[0];
  if(!file) return;
  const maxMB=2;
  if(file.size>maxMB*1024*1024){toast('Max. '+maxMB+' MB pro Datei','bad');input.value='';return;}
  const reader=new FileReader();
  reader.onload=function(){
    db.collection('globalTN').doc(tnId).collection('dokumente').add({
      fileName:file.name,
      fileType:file.type,
      fileSize:file.size,
      data:reader.result,
      vonRolle:'arbeitgeber',
      vonEmail:_email||'',
      vonFirma:_firma||'',
      ts:Date.now()
    }).then(()=>{toast('📄 Dokument gesendet ✓');}).catch(err=>toast('Fehler: '+err.message,'bad'));
  };
  reader.readAsDataURL(file);
  input.value='';
}

function downloadDok(tnId,docId){
  db.collection('globalTN').doc(tnId).collection('dokumente').doc(docId).get().then(doc=>{
    if(!doc.exists) return;
    const d=doc.data();
    if(d.data){
      const a=document.createElement('a');a.href=d.data;a.download=d.fileName||d.name||'dokument';a.click();
    } else if(d.url){
      window.open(d.url,'_blank');
    }
  }).catch(err=>toast('Fehler: '+err.message,'bad'));
}

function deleteDok(tnId,docId,name){
  if(!confirm('Dokument "'+name+'" löschen?')) return;
  db.collection('globalTN').doc(tnId).collection('dokumente').doc(docId).delete()
    .then(()=>toast('Gelöscht'))
    .catch(err=>toast('Fehler: '+err.message,'bad'));
}

}

function showInstallBanner(){

  if(sessionStorage.getItem('ag_install_dismissed'))return;
  const b=document.createElement('div');b.id='installBanner';
  b.style.cssText='position:fixed;bottom:0;left:0;right:0;z-index:9999;padding:16px;background:linear-gradient(135deg,#1d4ed8,#3b82f6);color:#fff;font-family:"Sora",sans-serif;box-shadow:0 -4px 24px rgba(0,0,0,.15)';
  b.innerHTML='<div style="display:flex;align-items:center;gap:12px;max-width:500px;margin:0 auto"><div style="font-size:2rem;flex-shrink:0">🏢</div><div style="flex:1"><div style="font-size:.88rem;font-weight:800">ArbeitgeberPro installieren</div><div style="font-size:.68rem;opacity:.85;margin-top:2px">App auf dem Startbildschirm – schneller Zugriff!</div></div><button onclick="doInstallAG()" style="padding:10px 18px;border:2px solid rgba(255,255,255,.5);border-radius:10px;background:rgba(255,255,255,.2);color:#fff;font-family:\'Sora\',sans-serif;font-size:.8rem;font-weight:800;cursor:pointer;flex-shrink:0">Installieren</button><button onclick="dismissInstallAG()" style="background:none;border:none;color:rgba(255,255,255,.6);font-size:1.2rem;cursor:pointer;padding:4px;flex-shrink:0">✕</button></div>';
  document.body.appendChild(b);
}
function doInstallAG(){if(_installPrompt){_installPrompt.prompt();_installPrompt.userChoice.then(()=>{_installPrompt=null;const b=document.getElementById('installBanner');if(b)b.remove();});}}
function dismissInstallAG(){const b=document.getElementById('installBanner');if(b)b.remove();sessionStorage.setItem('ag_install_dismissed','1');}
</script>
</body>
