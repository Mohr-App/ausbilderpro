<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>AusbilderPro</title>
<meta name="theme-color" content="#1e3a5f">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest-start.json">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<script>
// Auto-redirect wenn Rolle bereits gewählt
var saved = localStorage.getItem('ausbilderpro_role');
if(saved === 'ag') { window.location.replace('ArbeitgeberPro.html'); }
else if(saved === 'ma') { window.location.replace('MitarbeiterPro.html'); }
</script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Sora',sans-serif;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:linear-gradient(135deg,#2563eb,#059669);
  color:#fff;
  overflow:hidden;
}
.wrap{
  width:100%;max-width:400px;padding:40px 24px;text-align:center;
  animation:fadeUp .6s ease-out;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}

/* Icon */
.icon-wrap{
  width:100px;height:100px;
  margin:0 auto 28px;
  border-radius:24px;
  background:rgba(255,255,255,0.12);
  border:2px solid rgba(255,255,255,0.2);
  display:flex;align-items:center;justify-content:center;
  backdrop-filter:blur(10px);
}
.icon-wrap img{width:72px;height:72px;border-radius:14px}

/* Title */
.title{font-size:1.8rem;font-weight:800;letter-spacing:.02em;margin-bottom:4px}
.subtitle{font-size:.82rem;font-weight:400;color:rgba(255,255,255,.65);margin-bottom:40px}

/* Cards */
.role-card{
  display:flex;align-items:center;gap:16px;
  width:100%;padding:22px 24px;
  background:rgba(255,255,255,0.1);
  border:2px solid rgba(255,255,255,0.2);
  border-radius:16px;
  cursor:pointer;
  text-align:left;
  font-family:'Sora',sans-serif;
  color:#fff;
  transition:all .2s;
  margin-bottom:12px;
  backdrop-filter:blur(8px);
}
.role-card:hover,.role-card:active{
  background:rgba(255,255,255,0.2);
  border-color:rgba(255,255,255,0.4);
  transform:scale(1.02);
}
.role-icon{
  width:52px;height:52px;
  border-radius:14px;
  background:rgba(255,255,255,0.15);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
.role-icon svg{width:28px;height:28px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.role-info{flex:1;min-width:0}
.role-name{font-size:1.05rem;font-weight:700;margin-bottom:3px}
.role-desc{font-size:.68rem;color:rgba(255,255,255,.6);line-height:1.4}
.role-arrow{font-size:1.2rem;color:rgba(255,255,255,.4);flex-shrink:0}

/* Divider */
.divider{
  display:flex;align-items:center;gap:12px;
  margin:8px 0;
  font-size:.65rem;color:rgba(255,255,255,.35);
  letter-spacing:.1em;
}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.15)}

/* Footer */
.footer{
  margin-top:36px;
  font-size:.6rem;
  color:rgba(255,255,255,.3);
  line-height:1.6;
}
.footer a{color:rgba(255,255,255,.45);text-decoration:none}
</style>
</head>
<body>

<div class="wrap">
  <div class="icon-wrap">
    <img src="icon-192.png" alt="AusbilderPro">
  </div>

  <div class="title">AusbilderPro</div>
  <div class="subtitle">Zeiterfassung · Aufträge · Verwaltung</div>

  <button class="role-card" onclick="chooseRole('ag')" title="Als Arbeitgeber anmelden">
    <div class="role-icon">
      <svg viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
    </div>
    <div class="role-info">
      <div class="role-name">Arbeitgeber</div>
      <div class="role-desc">Azubis verwalten, Zeiten einsehen, Meldungen empfangen</div>
    </div>
    <div class="role-arrow">›</div>
  </button>

  <div class="divider">oder</div>

  <button class="role-card" onclick="chooseRole('ma')" title="Als Mitarbeiter anmelden">
    <div class="role-icon">
      <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    </div>
    <div class="role-info">
      <div class="role-name">Mitarbeiter</div>
      <div class="role-desc">Einstempeln, Aufträge, Krankmeldung, Urlaub</div>
    </div>
    <div class="role-arrow">›</div>
  </button>

  <div class="footer">
    <a href="datenschutz.html">Datenschutz</a> · <a href="nutzungsbedingungen.html">Nutzungsbedingungen</a><br>
    AusbilderPro Suite · ausbilderpro.de
  </div>
</div>

<script>
function chooseRole(role){
  localStorage.setItem('ausbilderpro_role', role);
  if(role === 'ag') window.location.href = 'ArbeitgeberPro.html';
  else window.location.href = 'MitarbeiterPro.html';
}
</script>
</body>
</html>
